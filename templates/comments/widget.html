{% macro comments_widget(page_type, page_id) %}
<section class="comments-section mt-5 mb-4"
         data-page-type="{{ page_type }}"
         data-page-id="{{ page_id }}">
  <h2 class="h3 fw-bold mb-3 section-heading">Discussion</h2>
  <div class="card comments-card">
    <div class="card-header d-flex align-items-center justify-content-between">
      <span class="fw-semibold">Comments</span>
      <div class="comments-sort-group">
        <button class="comments-sort-btn active" data-sort="newest">Newest</button>
        <button class="comments-sort-btn" data-sort="top">Top</button>
      </div>
    </div>

    <!-- Comment form -->
    <div class="comments-form-wrap">
      <div class="comments-identity" style="display:none;"></div>
      <input type="text" class="comments-name-input" placeholder="Enter a username to start commenting…" maxlength="50">
      <textarea class="comments-body-input" rows="3"
                placeholder="Share your thoughts…" maxlength="500"></textarea>
      <div class="comments-form-footer">
        <span class="comments-char-count">0 / 500</span>
        <button class="comments-submit-btn">Post Comment</button>
      </div>
      <div class="comments-error" style="display:none;"></div>
    </div>

    <!-- Comment list -->
    <div class="comments-list">
      <div class="comments-loading">Loading…</div>
    </div>
  </div>
</section>
{% endmacro %}
